description: a ".." smuggled between encoded slashes is rejected
rules:
    # The decode-for-validation view turns
    # a%2F..%2Fadmin into a/../admin, so the
    # ".." is caught like a raw one. The
    # path is invalid before any matcher.
    - pred: |-
        path.match(literal("api/v4/projects",
            capture_encoded("project", set("/"), greedy())), allow_encoded(set("/")))
rules_desugared:
    - pred: |-
        path.match(
          literal("api/v4/projects",
            capture_encoded("project",
              set("/"),
              greedy())),
          allow_encoded(
            set("/")))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /api/v4/projects/a%2F..%2Fadmin/issues
      expect:
        allowed: false
        deny_kind: teleport_invalid_request
    - request:
        method: GET
        path: /api/v4/projects/a%2F%2Fb/issues
      expect:
        allowed: false
        deny_kind: teleport_invalid_request
