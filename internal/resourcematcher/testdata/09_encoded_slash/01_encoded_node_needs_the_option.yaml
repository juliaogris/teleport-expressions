description: an encoded node without allow_encoded fails closed
app_resources_expression:
    # capture_encoded names an encoded
    # segment. Without allow_encoded the
    # match admits no encoding, so an
    # encoded path fails closed.
    - |-
      path.match(literal("registry",
          capture_encoded("package", set("/"))))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /registry/@babel%2fcore
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
    - request:
        method: GET
        path: /registry/lodash
      expect:
        allowed: true
        vars:
            package: lodash
