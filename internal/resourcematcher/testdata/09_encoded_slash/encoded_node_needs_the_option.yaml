description: an encoded node without allow_encoded fails closed
rules:
    # capture_encoded names an encoded
    # position, but the match admits no
    # encoding until allow_encoded opts it
    # in. Without it an encoded path fails
    # closed; a plain segment still matches.
    - pred: |-
        path.match(literal("registry",
            capture_encoded("package", set("/"))))
rules_desugared:
    - pred: |-
        path.match(
          literal("registry",
            capture_encoded("package",
              set("/"))))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /registry/@babel%2fcore
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
    - request:
        method: GET
        path: /registry/lodash
      expect:
        allowed: true
        vars:
            package: lodash
