description: npm scoped package keeps its literal "@" raw
rules:
    # npm scoped package: /@scope%2fname,
    # as the npm registry addresses it.
    # capture_encoded binds the id raw, so
    # the "@" forwards as "@", never %40.
    # allow_encoded opts in the slash.
    - pred: |-
        path.match(literal("registry",
            capture_encoded("package", set("/"))), allow_encoded(set("/")))
rules_desugared:
    - pred: |-
        path.match(
          literal("registry",
            capture_encoded("package",
              set("/"))),
          allow_encoded(
            set("/")))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /registry/@babel%2fcore
      expect:
        allowed: true
        vars:
            package: '@babel%2fcore'
    - request:
        method: GET
        path: /registry/lodash
      expect:
        allowed: true
        vars:
            package: lodash
