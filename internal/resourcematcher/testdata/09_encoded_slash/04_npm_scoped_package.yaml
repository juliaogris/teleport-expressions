description: npm scoped package keeps its literal "@" raw
app_resources_expression:
    # An npm id is /@scope%2fname.
    # capture_encoded binds it raw, so the
    # "@" is forwarded as "@", never %40.
    - |-
      path.match(literal("registry",
          capture_encoded("package", set("/"))),
      allow_encoded(set("/")))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /registry/@babel%2fcore
      expect:
        allowed: true
        vars:
            package: '@babel%2fcore'
    - request:
        method: GET
        path: /registry/lodash
      expect:
        allowed: true
        vars:
            package: lodash
