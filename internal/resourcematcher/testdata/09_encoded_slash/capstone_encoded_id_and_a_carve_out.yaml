description: an encoded id, a carved-out subtree, and the encoded-slash opt-in
rules:
    # The whole model in one tree.
    # capture_encoded binds the project id
    # raw, plain or encoded. Its child
    # greedy_except admits the rest but
    # carves out a "secret" subtree.
    # allow_encoded opts in the slash.
    - pred: |-
        path.match(literal("api/v4/projects",
            capture_encoded("project", set("/"),
                greedy_except(literal("secret", greedy())))),
        allow_encoded(set("/")))
rules_desugared:
    - pred: |-
        path.match(
          literal("api/v4/projects",
            capture_encoded("project",
              set("/"),
              greedy_except(
                literal("secret",
                  greedy())))),
          allow_encoded(
            set("/")))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /api/v4/projects/mygroup%2fmyproject/issues
      expect:
        allowed: true
        vars:
            project: mygroup%2fmyproject
    - request:
        method: GET
        path: /api/v4/projects/123/secret/key
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
