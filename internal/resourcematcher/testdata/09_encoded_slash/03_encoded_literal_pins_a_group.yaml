description: encoded_literal pins one group/project by its decoded value
app_resources_expression:
    # encoded_literal pins one id by its
    # decoded value, in either hex case
    # (%2F or %2f). The "/" is content, so
    # the node stays one segment.
    # allow_encoded opts in the slash.
    - |-
      path.match(literal("api/v4/projects",
          encoded_literal("mygroup/myproject", set("/"),
              literal("issues"))), allow_encoded(set("/")))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /api/v4/projects/mygroup%2Fmyproject/issues
      expect:
        allowed: true
    - request:
        method: GET
        path: /api/v4/projects/mygroup%2fmyproject/issues
      expect:
        allowed: true
    - request:
        method: GET
        path: /api/v4/projects/other%2Fthing/issues
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
    - request:
        method: GET
        path: /api/v4/projects/mygroup/myproject/issues
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
