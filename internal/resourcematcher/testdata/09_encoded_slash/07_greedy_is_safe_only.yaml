description: a broad ** never spans an encoded slash
app_resources:
    # greedy is safe-only: it spans only
    # segments with no encoding. /files/**
    # matches a plain tail but stops at an
    # encoded slash, so it never admits one.
    # The path is valid, it just matches no
    # rule.
    - paths:
        - /files/**
app_resources_desugared:
    - |-
      path.match(
        literal("files",
          greedy()))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /files/a/b/c
      expect:
        allowed: true
    - request:
        method: GET
        path: /files/a%2Fb
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
    - request:
        method: GET
        path: /files
      expect:
        allowed: true
