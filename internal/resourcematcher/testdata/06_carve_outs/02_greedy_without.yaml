description: 'greedy_without: exclude and carve out subtrees'
rules:
    # allows /files/reports/q3
    # denies /files/secret/key
    - where: |-
        path.match(literal("files",
            greedy_without("secret", "private")))
rules_desugared:
    - pred: |-
        path.match(
          literal("files",
            greedy_without("secret", "private")))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /files/reports/q3
      expect:
        allowed: true
    - request:
        method: GET
        path: /files/secret/key
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
    - request:
        method: GET
        path: /files/%73ecret/key
      expect:
        allowed: false
        deny_kind: teleport_invalid_request
