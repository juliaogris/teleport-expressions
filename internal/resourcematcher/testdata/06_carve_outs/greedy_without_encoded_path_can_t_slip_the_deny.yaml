description: 'greedy_without: an encoded path can''t slip the deny'
rules:
    # greedy_without grants files/** but
    # denies the secret and private
    # subtrees. Reaching secret with an
    # encoded "s" (%73) can't slip it: the
    # tokenizer rejects the escape, so the
    # path is invalid before the rule runs.
    - where: |-
        path.match(literal("files",
            greedy_without("secret", "private")))
rules_desugared:
    - pred: |-
        path.match(
          literal("files",
            greedy_without("secret", "private")))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /files/%73ecret/key
      expect:
        allowed: false
        deny_kind: teleport_invalid_request
    - request:
        method: GET
        path: /files/secret/key
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
    - request:
        method: GET
        path: /files/public/key
      expect:
        allowed: true
