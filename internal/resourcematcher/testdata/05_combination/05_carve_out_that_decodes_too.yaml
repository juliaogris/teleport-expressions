description: carve-out and the strict tokenizer
app_resources_expression:
    # A negated carve-out denies
    # files/secret. Reaching it with an
    # encoded "s" (%73) never decodes: the
    # tokenizer rejects the escape, so the
    # path is invalid before the rule runs.
    - |-
      !path.match(literal("files",
          literal("secret", greedy())))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /files/%73ecret/key
      expect:
        allowed: false
        deny_kind: teleport_invalid_request
    - request:
        method: GET
        path: /files/public/key
      expect:
        allowed: true
    - request:
        method: GET
        path: /files/secret/key
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
    - request:
        method: GET
        path: /files/secret%2fkey
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
    - request:
        method: GET
        path: /other
      expect:
        allowed: true
